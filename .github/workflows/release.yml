name: Telemetry Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      occ_image:
        description: 'OCC Image Version (e.g., 0.1.0-0.2.0)'
        required: true
        type: string
      dry_run:
        description: 'Perform a dry run without creating a release'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release creation (re-create existing release, skip validation checks)'
        required: false
        default: false
        type: boolean
run-name: "${{ github.event.inputs.dry_run == true && '[DRY RUN] ' || '' }}${{ github.event.inputs.force == true && '[FORCE] ' || '' }}Release Telemetry version ${{ github.event.inputs.version }} with OCC image ${{ github.event.inputs.occ_image }}"

permissions:
  contents: write
  issues: read
  actions: read
  pull-requests: read

jobs:
  validate-and-prepare-branch:
    runs-on: ubuntu-latest
    outputs:
      release-branch: ${{ steps.determine-branch.outputs.release-branch }}
      is-patch: ${{ steps.determine-branch.outputs.is-patch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
          OCC_IMAGE: ${{ github.event.inputs.occ_image }}
        run: |
          echo "Validating version formats..."
      
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION}"
            echo "Expected format: X.Y.Z (e.g., 1.2.3)"
            exit 1
          fi
          echo "✓ Release version format valid: ${VERSION}"

          if ! [[ "${OCC_IMAGE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid OCC image version format: ${OCC_IMAGE}"
            echo "Expected format: X.Y.Z-A.B.C (e.g., 1.2.3-4.5.6)"
            exit 1
          fi
          echo "✓ OCC image version format valid: ${OCC_IMAGE}"
      - name: Check if milestone exists and is closed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "Checking milestone for version ${VERSION}..."
          MILESTONE=$(gh api "repos/${{ github.repository }}/milestones?state=all" --jq ".[] | select(.title == \"${VERSION}\")")

          if [ -z "$MILESTONE" ]; then
            echo "Milestone ${VERSION} does not exist. Please create it first."
            exit 1
          fi

          STATE=$(echo "$MILESTONE" | jq -r '.state')
          if [ "$STATE" != "closed" ]; then
            echo "Milestone ${VERSION} is still open. Please close the milestone before releasing."
            exit 1
          fi

          OPEN_ISSUES=$(echo "$MILESTONE" | jq -r '.open_issues')
          if [ "$OPEN_ISSUES" -gt 0 ]; then
            echo "Milestone ${VERSION} has ${OPEN_ISSUES} open issue(s). Please close all issues before releasing."
            exit 1
          fi

          echo "Milestone ${VERSION} exists, is closed, and has no open issues."

      - name: Check if release already exists
        if: ${{ github.event.inputs.force != true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "Checking if release ${VERSION} already exists..."
          if gh release view "${VERSION}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${VERSION} already exists. Please choose a different version."
            exit 1
          fi
          echo "Release ${VERSION} does not exist yet."

      - name: Delete existing release (force mode)
        if: ${{ github.event.inputs.force == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "FORCE MODE: Checking for existing release ${VERSION}..."
          if gh release view "${VERSION}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::warning::Deleting existing release ${VERSION}"
            gh release delete "${VERSION}" --repo "${{ github.repository }}" --yes
            echo "✓ Deleted existing release ${VERSION}"
          else
            echo "No existing release found for ${VERSION}"
          fi

      - name: Check if tag already exists
        if: ${{ github.event.inputs.force != true }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "Checking if tag ${VERSION} already exists..."
          git fetch --tags
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION} already exists in the repository."
            echo "Existing tags:"
            git tag -l "${VERSION}"
            echo "Please choose a different version or delete the existing tag first."
            exit 1
          fi
          echo "✓ Tag ${VERSION} does not exist yet."

      - name: Delete existing tag (force mode)
        if: ${{ github.event.inputs.force == true }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "FORCE MODE: Checking for existing tag ${VERSION}..."
          git fetch --tags
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "::warning::Deleting existing tag ${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -d "${VERSION}"
            git push origin ":refs/tags/${VERSION}"
            echo "✓ Deleted existing tag ${VERSION}"
          else
            echo "No existing tag found for ${VERSION}"
          fi

      - name: Determine release branch and type
        id: determine-branch
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          RELEASE_BRANCH="release-$(echo ${VERSION} | cut -d. -f1-2)"
          echo "release-branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT

          git fetch origin "${RELEASE_BRANCH}" 2>/dev/null || true
          if git rev-parse --verify "origin/${RELEASE_BRANCH}" > /dev/null 2>&1; then
            echo "is-patch=true" >> $GITHUB_OUTPUT
            echo "Patch release detected. Branch ${RELEASE_BRANCH} exists."
          else
            echo "is-patch=false" >> $GITHUB_OUTPUT
            echo "Minor/Major release detected. Branch ${RELEASE_BRANCH} will be created."
          fi

      - name: Create release branch (if minor/major release)
        if: steps.determine-branch.outputs.is-patch == 'false'
        env:
          RELEASE_BRANCH: ${{ steps.determine-branch.outputs.release-branch }}
        run: |
          echo "Creating release branch ${RELEASE_BRANCH} from main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${RELEASE_BRANCH}"
          git push origin "${RELEASE_BRANCH}"
          echo "Created branch ${RELEASE_BRANCH}"
